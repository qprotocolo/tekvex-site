<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TekVex AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #020617, #000);
      color: #e5e7eb;
      overflow-x: hidden;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 42px;
      max-width: 800px;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      margin-top: 15px;
      font-size: 18px;
      color: #9ca3af;
      max-width: 600px;
    }

    .cta {
      margin-top: 25px;
      display: flex;
      gap: 15px;
    }

    .btn {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .btn-primary {
      background: #22c55e;
      color: #020617;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #22c55e;
      color: #22c55e;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* CHAT FLOAT */
    .chat-box {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 320px;
      height: 420px;
      background: rgba(2, 6, 23, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid #22c55e33;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 40px #22c55e22;
    }

    .chat-header {
      padding: 12px;
      border-bottom: 1px solid #22c55e22;
      font-size: 14px;
      color: #22c55e;
    }

    .chat-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 13px;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #22c55e22;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      color: white;
      outline: none;
    }

    .chat-input button {
      background: #22c55e;
      border: none;
      padding: 10px;
      cursor: pointer;
    }

    /* QUICK BUTTONS */
    .quick {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
    }

    .quick button {
      font-size: 11px;
      padding: 6px 8px;
      background: transparent;
      border: 1px solid #22c55e33;
      color: #22c55e;
      border-radius: 8px;
      cursor: pointer;
    }

    /* BENEFITS */
    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
    }

    .card {
      width: 250px;
      padding: 20px;
      background: rgba(2, 6, 23, 0.6);
      border: 1px solid #22c55e22;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>Automatize o atendimento da sua clínica com IA</h1>
    <p>Responda pacientes automaticamente, aumente agendamentos e nunca perca um lead.</p>

    <div class="cta">
      <button class="btn btn-primary" onclick="openWhats()">Ver funcionando</button>
      <button class="btn btn-secondary" onclick="openWhats()">Falar no WhatsApp</button>
    </div>
  </section>

  <section class="section">
    <h2>Resultados reais</h2>
    <div class="cards">
      <div class="card">+ Agendamentos automáticos</div>
      <div class="card">Atendimento 24h</div>
      <div class="card">Zero perda de leads</div>
    </div>
  </section>

  <!-- CHAT -->
  <div class="chat-box">
    <div class="chat-header">Vex • Assistente IA</div>

    <div id="messages" class="chat-messages"></div>

    <div class="quick">
      <button onclick="sendQuick('Quero automatizar minha clínica')">Automatizar</button>
      <button onclick="sendQuick('Como funciona?')">Como funciona</button>
      <button onclick="sendQuick('Quero ver na prática')">Ver na prática</button>
    </div>

    <div class="chat-input">
      <input id="input" placeholder="Digite..." />
      <button onclick="sendMessage()">→</button>
    </div>
  </div>

<script>
const API = "https://tekvex-ai-production.up.railway.app/chat";

function createSession(){
  const id = 'sess_' + Math.random().toString(36).substring(2) + Date.now();
  localStorage.setItem('vex_session', id);
  return id;
}

function sendQuick(text){
  document.getElementById('input').value = text;
  sendMessage();
}

async function sendMessage(){
  const input = document.getElementById('input');
  const msg = input.value;
  if(!msg) return;

  addMessage("Você", msg);
  input.value = "";

  const res = await fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      message: msg,
      sessionId: localStorage.getItem('vex_session') || createSession()
    })
  });

  const data = await res.json();
  addMessage("Vex", data.reply);
}

function addMessage(sender, text){
  const div = document.createElement("div");
  div.innerHTML = `<strong>${sender}:</strong> ${text}`;
  document.getElementById("messages").appendChild(div);
}

function openWhats(){
  window.open("https://wa.me/5544988319304?text=Quero%20automatizar%20meu%20atendimento", "_blank");
}
</script>

</body>
</html>
